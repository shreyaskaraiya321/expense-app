<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  background:#f5f7fa;
  padding:10px;
}

.container {
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:15px;
  border-radius:10px;
}

h1 { text-align:center; }

input, button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  background:#4f46e5;
  color:white;
  font-weight:bold;
}

/* QUICK */
.quick-row {
  display:flex;
  gap:10px;
}
.quick-row button {
  flex:1;
  background:#059669;
}

/* MONTH */
.month-picker {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-top:10px;
}

.month-btn {
  padding:10px;
  background:#eee;
  border-radius:6px;
}

.month-btn.active {
  background:#4f46e5;
  color:white;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td {
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
  font-size:13px;
}

.delete-btn {
  background:#dc2626;
  color:white;
  padding:6px;
}

@media(max-width:600px){
  table {
    display:block;
    overflow-x:auto;
  }
}
</style>
</head>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js')
    .then(() => console.log("SW registered"));
}
</script>
<body>

<div class="container">

<h1>Monthly Expense Tracker</h1>

<h2>Add Expense</h2>

<input type="number" id="amount" placeholder="Amount">
<input type="text" id="reason" placeholder="Reason">
<input type="date" id="date">

<button onclick="addExpense()">Add Expense</button>

<div class="quick-row">
  <button onclick="quickAdd(25)">+ ₹25</button>
  <button onclick="quickAdd(30)">+ ₹30</button>
</div>
<h2>Budget & Smart Planner</h2>

<input type="number" id="budgetInput" placeholder="Monthly Budget">

<button onclick="saveBudget()">Save Budget</button>

<h4>Save Percentage</h4>
<input type="range" id="saveSlider" min="0" max="100" value="50" oninput="updatePercent()">

<p id="percentText">Save: 50% | Spend: 50%</p>

<div id="summary"></div>

<h2>Expense Records</h2>

<div id="monthPicker" class="month-picker"></div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Amount</th>
<th>Reason</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<h3 id="total"></h3>

</div>

<!-- FIREBASE + APP LOGIC -->


<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAOsvl8x0drH8ghKyEWocyUTfy0S1N-fuk",
  authDomain: "expense-tracker-9b288.firebaseapp.com",
  projectId: "expense-tracker-9b288",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allExpenses = [];
let selectedMonth = "";
let budgetMap = {};

/* ADD */
function addExpense(){
  const amount = document.getElementById("amount").value;
  const reason = document.getElementById("reason").value;
  const date = document.getElementById("date").value;

  if(!amount || !reason || !date) return alert("Fill all");

  db.collection("expenses").add({
    amount: Number(amount),
    reason,
    date
  }).then(()=>{
    document.getElementById("amount").value = "";
    document.getElementById("reason").value = "";

    loadData();

    // 🔥 move here
    window.scrollTo({top:0, behavior:"smooth"});
  });
}

/* QUICK */
function quickAdd(amount){
  const date = new Date().toISOString().split('T')[0];

  db.collection("expenses").add({
    amount,
    reason:"Quick",
    date
  }).then(loadData);
}

/* BUDGET */
function saveBudget(){
  if(!selectedMonth){
    selectedMonth = new Date().toISOString().slice(0,7);
  }

  const budget = Number(document.getElementById("budgetInput").value);
  if(!budget) return alert("Enter budget");

  db.collection("budgets").doc(selectedMonth).set({
    amount: budget
  }).then(()=>{
    alert("Budget saved");
    loadData();
  });
}

/* SLIDER */
function updatePercent(){
  const val = document.getElementById("saveSlider").value;
  document.getElementById("percentText").innerText =
    `Save: ${val}% | Spend: ${100-val}%`;

  render();
}

/* DELETE */
function del(id){
  db.collection("expenses").doc(id).delete().then(loadData);
}

/* LOAD */
function loadData(){
  allExpenses = [];
  budgetMap = {};

  db.collection("expenses").get().then(snap=>{
    snap.forEach(doc=>{
      allExpenses.push({ id: doc.id, ...doc.data() });
    });

    return db.collection("budgets").get();
  }).then(snap=>{
    snap.forEach(doc=>{
      budgetMap[doc.id] = doc.data().amount;
    });

    loadMonths();
    render();
  });
}

/* MONTH */
function loadMonths(){
  const box = document.getElementById("monthPicker");
  box.innerHTML = "";

  const months = [...new Set(allExpenses.map(e=>e.date.slice(0,7)))].sort();

  if(!selectedMonth){
    selectedMonth = months.length
      ? months[months.length-1]
      : new Date().toISOString().slice(0,7);
  }

  months.forEach(m=>{
    const btn = document.createElement("button");

    btn.className = "month-btn" + (m===selectedMonth ? " active":"");

    const [y, mo] = m.split("-");
    const name = new Date(y, mo-1).toLocaleString("default",{month:"short"});

    btn.innerText = name+" "+y;

    btn.onclick = ()=>{
      selectedMonth = m;
      loadMonths();
      render();
    };

    box.appendChild(btn);
  });
}

/* RENDER */
function render(){
  const table = document.getElementById("table");
  table.innerHTML = "";

  let total = 0;

  allExpenses.forEach(e=>{
    if(e.date.startsWith(selectedMonth)){
      total += e.amount;

      table.innerHTML += `
        <tr>
          <td>${e.date}</td>
          <td>₹${e.amount}</td>
          <td>${e.reason}</td>
          <td><button class="delete-btn" onclick="del('${e.id}')">Delete</button></td>
        </tr>
      `;
    }
  });

  document.getElementById("total").innerText =
    `Total for ${selectedMonth}: ₹${total}`;

  const budget = budgetMap[selectedMonth] || 0;
  const savePercent = document.getElementById("saveSlider").value;

  const saveAmount = (total * savePercent) / 100;
  const spendAmount = total - saveAmount;
  const remaining = budget - total;

  document.getElementById("summary").innerHTML = `
    <h3>Total for ${selectedMonth}: ₹${total}</h3>
    <p style="color:green;">
      Remaining ₹${remaining} | Save ₹${saveAmount.toFixed(0)} | Spend ₹${spendAmount.toFixed(0)}
    </p>
    <h3>Overall Total: ₹${allExpenses.reduce((s,e)=>s+e.amount,0)}</h3>
    <div style="border-left:4px solid #4f46e5; padding:10px;">
      Save ₹${saveAmount.toFixed(0)} aside. Spend max ₹${spendAmount.toFixed(0)}.
    </div>
  `;
}

/* INIT */
document.addEventListener("DOMContentLoaded", ()=>{
  document.getElementById("date").valueAsDate = new Date();
  loadData();
});

</script>


</body>
</html>
